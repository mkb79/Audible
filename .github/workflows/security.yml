name: Security

on:
  pull_request:
  push:
    branches:
      - master
  # A new advisory can land without anyone touching the code, so the audit also
  # runs on a schedule rather than only on changes.
  merge_group:
    types: [checks_requested]
  schedule:
    # UTC, so 04:17 Monday UTC rather than local time.
    - cron: "17 4 * * 1"
  workflow_dispatch:

# Read-only by default. The scorecard job raises its own permissions, and only
# that job does.
permissions:
  contents: read

concurrency:
  # Same reasoning as ci.yml: pull request runs supersede each other, while
  # master, scheduled and dispatched runs each get a unique group so none of them
  # can be replaced while pending.
  group: >-
    ${{ github.workflow }}-${{ github.event_name == 'pull_request'
    && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_COLOR: "1"
  UV_VERSION: "0.11.28"

jobs:
  dependency-review:
    # Only meaningful on a pull request: the action compares the base and head
    # of a diff and fails when that diff introduces a vulnerable dependency.
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          # No license policy is defined for this project, so do not invent one
          # here; that decision belongs in the repository, not in a CI flag.

  audit:
    # Audits the resolved dependency set rather than the diff, which is what
    # catches an advisory published against a version that was already locked.
    name: audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.14"

      - name: Audit locked dependencies
        run: uv run nox --session=audit --python=3.14

  scorecard:
    # Informational only, and deliberately not part of the gate: the score
    # reacts to repository settings rather than to the change under review.
    name: scorecard
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to publish the SARIF result to the code scanning view. No
      # id-token here: publish_results is left at its default of false, so
      # nothing is signed and OIDC would be an unused privilege.
      security-events: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif

      - name: Upload the results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  gate:
    # Stable check name to require in branch protection, alongside `required`
    # from ci.yml.
    name: security
    runs-on: ubuntu-latest
    needs: [dependency-review, audit]
    if: always()
    steps:
      # Each job is checked individually rather than looping over every result.
      # A blanket "skipped is fine" would also accept a skipped audit, so a
      # future condition or `needs` edge could disable the audit while leaving
      # this gate green.
      - name: Verify the audit ran and passed
        if: needs.audit.result != 'success'
        run: |
          echo "::error::audit did not succeed: ${{ needs.audit.result }}"
          exit 1

      - name: Verify the dependency review passed
        # It only runs on pull requests, so outside them `skipped` is the
        # expected and only acceptable non-success result.
        if: >-
          (github.event_name == 'pull_request' && needs.dependency-review.result != 'success') ||
          (github.event_name != 'pull_request' && needs.dependency-review.result != 'skipped')
        run: |
          echo "::error::dependency-review did not succeed: ${{ needs.dependency-review.result }}"
          exit 1
