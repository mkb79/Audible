version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
sphinx:
  configuration: docs/source/conf.py
  # The build is warning-free; keep it that way. A new warning is almost always a
  # real regression (a broken cross-reference, a dead include, an ambiguous
  # target) and is easy to miss in a wall of accepted noise.
  fail_on_warning: true
formats:
  - pdf
python:
  install:
    # Runs `uv sync --group docs`, which installs the docs dependency group from
    # pyproject.toml together with the project itself, replacing the previous pair
    # of entries (docs/requirements.txt + path: .). Doc dependency versions are
    # therefore maintained in pyproject.toml only. Note that `method: uv` allows
    # exactly one entry here.
    - method: uv
      command: sync
      groups:
        - docs
